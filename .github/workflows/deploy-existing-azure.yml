name: Deploy To Existing Azure Resources

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group containing the existing App Services
        required: true
        type: string
      name_prefix:
        description: "Name prefix used by Bicep (for example: eshop-frgom)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 3
      matrix:
        app:
          - project: src/Identity.API/Identity.API.csproj
            suffix: identity-api
          - project: src/Catalog.API/Catalog.API.csproj
            suffix: catalog-api
          - project: src/Basket.API/Basket.API.csproj
            suffix: basket-api
          - project: src/Ordering.API/Ordering.API.csproj
            suffix: ordering-api
          - project: src/Webhooks.API/Webhooks.API.csproj
            suffix: webhooks-api
          - project: src/WebApp/WebApp.csproj
            suffix: webapp
          - project: src/WebhookClient/WebhookClient.csproj
            suffix: webhookclient
          - project: src/OrderProcessor/OrderProcessor.csproj
            suffix: orderprocessor
          - project: src/PaymentProcessor/PaymentProcessor.csproj
            suffix: paymentprocessor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restore
        run: dotnet restore eShop.slnx

      - name: Publish ${{ matrix.app.suffix }}
        run: dotnet publish ${{ matrix.app.project }} -c Release -o ./publish/${{ matrix.app.suffix }}

      - name: Create deployment package
        run: |
          cd ./publish/${{ matrix.app.suffix }}
          zip -r ../../${{ matrix.app.suffix }}.zip .

      - name: Deploy to App Service
        run: |
          az webapp deploy \
            --resource-group "${{ inputs.resource_group }}" \
            --name "${{ inputs.name_prefix }}-${{ matrix.app.suffix }}" \
            --src-path "./${{ matrix.app.suffix }}.zip" \
            --type zip
